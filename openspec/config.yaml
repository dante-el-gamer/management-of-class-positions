# openspec/config.yaml
schema: spec-driven

context: |
  Project: ClassDeck
  Description: Desktop app to visually manage classroom seating arrangements.
  Tech stack: Tauri 2 + React 18 + TypeScript + Vite 5 + TailwindCSS 3 + Zustand 4
  Architecture: Layered — React components + Zustand stores + Tauri commands + Rust backend (rusqlite)
  Testing: Vitest (frontend, 79 unit tests) + cargo test (backend, 74+ tests)
  Style: TypeScript strict, TailwindCSS utility classes, Radix UI primitives

rules:
  proposal:
    - Include rollback plan for risky changes
    - Describe UI framework choice and rationale
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Specify desktop framework decision (Tauri, Electron, or native)
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns once established
    tdd: true
    test_command: npm test
  verify:
    test_command: npm test
    build_command: npm run build
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: true
  runner:
    detected: true
    framework: vitest
    command: npm test
  layers:
    unit:
      available: true
      tool: vitest
    integration:
      available: false
      tool: null
    e2e:
      available: false
      tool: null
  coverage:
    available: false
    command: null
  quality:
    linter:
      available: false
      command: null
    type_checker:
      available: true
      command: tsc
    formatter:
      available: false
      command: null

name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri'

      - name: Set release tag
        id: vars
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and release with Tauri
        uses: tauri-apps/tauri-action@v0.6
        with:
          tagName: ${{ steps.vars.outputs.tag }}
          releaseName: ${{ steps.vars.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Google Drive OAuth client ID — configure via GitHub repo secrets.
          # Placeholder value (for local/dev reference): your-client-id.apps.googleusercontent.com
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
